version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: monthly

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: monthly
    ignore:
      - dependency-name: mysql
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly

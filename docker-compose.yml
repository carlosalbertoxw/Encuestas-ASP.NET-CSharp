services:
  db:
    image: mysql:8.4
    container_name: encuestas-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-encuestas}
      MYSQL_USER: ${MYSQL_USER:-encuestas}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-encuestas}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
      # Los scripts de db/init solo se ejecutan la primera vez que se crea el volumen.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
